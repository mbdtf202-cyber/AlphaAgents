name: Release Readiness

on:
  workflow_dispatch:

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure strict release verification env
        run: |
          cat > .env.local <<'ENV'
          ALPHAAGENTS_ENV=release
          ALPHAAGENTS_APP_URL=${{ secrets.ALPHAAGENTS_APP_URL }}
          ALPHAAGENTS_API_URL=${{ secrets.ALPHAAGENTS_API_URL }}
          DATABASE_URL=${{ secrets.ALPHAAGENTS_DATABASE_URL }}
          REDIS_URL=${{ secrets.ALPHAAGENTS_REDIS_URL }}
          OBJECT_STORAGE_ENDPOINT=${{ secrets.ALPHAAGENTS_OBJECT_STORAGE_ENDPOINT }}
          OBJECT_STORAGE_BUCKET=${{ secrets.ALPHAAGENTS_OBJECT_STORAGE_BUCKET }}
          OBJECT_STORAGE_ACCESS_KEY_ID=${{ secrets.ALPHAAGENTS_OBJECT_STORAGE_ACCESS_KEY_ID }}
          OBJECT_STORAGE_SECRET_ACCESS_KEY=${{ secrets.ALPHAAGENTS_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          POSTMARK_SERVER_TOKEN=${{ secrets.ALPHAAGENTS_POSTMARK_SERVER_TOKEN }}
          SENTRY_DSN=${{ secrets.ALPHAAGENTS_SENTRY_DSN }}
          ALPHAAGENTS_AUTH_SECRET=${{ secrets.ALPHAAGENTS_AUTH_SECRET }}
          ALPHAAGENTS_INTERNAL_API_TOKEN=${{ secrets.ALPHAAGENTS_INTERNAL_API_TOKEN }}
          ALPHAAGENTS_INTERNAL_API_ACTOR_ROLES=${{ vars.ALPHAAGENTS_INTERNAL_API_ACTOR_ROLES }}
          ALPHAAGENTS_INTERNAL_API_SCOPES=${{ vars.ALPHAAGENTS_INTERNAL_API_SCOPES }}
          ALPHAAGENTS_INTERNAL_TENANT_ID=${{ vars.ALPHAAGENTS_INTERNAL_TENANT_ID }}
          ALPHAAGENTS_VERIFY_EXTERNAL_DEPS_STRICT=true
          ALPHAAGENTS_ENABLE_TEST_MAILER=false
          ALPHAAGENTS_ENABLE_DEMO_WRITE_API=false
          ENV

      - name: Documentation baseline
        run: |
          test -s README.md
          test -s docs/README.md
          test -s docs/product-design.md
          test -s docs/acceptance.md
          test -s docs/frontend-visual-design.md
          test -s docs/engineering-contract.md
          test -s docs/operations.md
          test -s contracts/alphaagents.contract.json
          test -s design/alphaagents-design-tokens.json
          test -s design/visual-masters/alphaagents-visual-master.html
          test -s evidence-packages/AA-SANDBOX-TRIAL-001/00-order-summary.md

      - name: Agent-native and CLI alignment baseline
        run: |
          grep -F "Agent Native" README.md
          grep -F "CLI Alignment" README.md
          grep -F "跨境电商竞品监控与内容选题情报包" README.md
          grep -F "alphaagents rfp publish" README.md
          grep -F "alphaagents rating submit" README.md
          grep -F "Trial / Standard / Pro" docs/frontend-visual-design.md
          grep -F "CommandEnvelope" docs/engineering-contract.md
          grep -F "Commercial Starting Lane" docs/operations.md
          grep -F "Validated Evidence Gap" docs/operations.md
          node scripts/verify-all.mjs
          ALPHAAGENTS_VERIFY_EXTERNAL_DEPS_STRICT=true pnpm verify:deps
          pnpm test
          pnpm typecheck
          pnpm build
          pnpm audit --audit-level moderate

      - name: Block old release path
        run: |
          : > /tmp/alphaagents-release-grep.log
          old_slug="alpha-agents-""ar""ena"
          old_crypto="crypto-""pe""rps"
          old_project="open-prompt-""proving-""ground"
          old_worker="worker:bench""ma""rks"
          old_executor="ALPHA_AGENTS_""EXECUTOR""_ID"
          old_verifier="ALPHA_AGENTS_""BENCH""MARK_VERIFIER_ID"
          old_bucket="OBJECT_STORAGE_BUCKET=alpha-agents-""ar""ena"
          for token in "$old_slug" "$old_crypto" "$old_project" "$old_worker" "$old_executor" "$old_verifier" "$old_bucket"; do
            grep -RniF "$token" README.md docs .github .env.example >> /tmp/alphaagents-release-grep.log || true
          done
          if test -s /tmp/alphaagents-release-grep.log; then
            cat /tmp/alphaagents-release-grep.log
            exit 1
          fi

      - name: Ready for implementation release planning
        run: |
          echo "Release packaging is intentionally disabled until the new agent-native transaction MVP exists."
