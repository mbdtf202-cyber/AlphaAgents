name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override"
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image_ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=sha

      - id: image_ref
        run: |
          image_repo="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "ref=ghcr.io/${image_repo}:${tag}" >> "${GITHUB_OUTPUT}"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image_ref.outputs.ref }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}

  deploy-production:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - github-release
    environment: production
    if: ${{ secrets.PROD_SSH_HOST != '' && secrets.PROD_SSH_PRIVATE_KEY != '' && secrets.PROD_SSH_USER != '' && secrets.PROD_APP_DIR != '' && secrets.GHCR_PAT != '' && secrets.GHCR_USERNAME != '' && secrets.APP_DOMAIN != '' && secrets.DATABASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Upload deployment assets
        env:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          APP_DIR: ${{ secrets.PROD_APP_DIR }}
        run: |
          ssh -p "${SSH_PORT}" -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" "mkdir -p ${APP_DIR}/deploy ${APP_DIR}/scripts"
          scp -P "${SSH_PORT}" -o StrictHostKeyChecking=no deploy/Caddyfile "${SSH_USER}@${SSH_HOST}:${APP_DIR}/deploy/Caddyfile"
          scp -P "${SSH_PORT}" -o StrictHostKeyChecking=no deploy/docker-compose.prod.yml "${SSH_USER}@${SSH_HOST}:${APP_DIR}/deploy/docker-compose.prod.yml"
          scp -P "${SSH_PORT}" -o StrictHostKeyChecking=no scripts/deploy-vm.sh "${SSH_USER}@${SSH_HOST}:${APP_DIR}/scripts/deploy-vm.sh"

      - name: Write production env and deploy
        env:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          APP_DIR: ${{ secrets.PROD_APP_DIR }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALPHA_AGENTS_AUTH_SECRET: ${{ secrets.ALPHA_AGENTS_AUTH_SECRET }}
          ALPHA_AGENTS_APP_URL: ${{ secrets.ALPHA_AGENTS_APP_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          POSTMARK_SERVER_TOKEN: ${{ secrets.POSTMARK_SERVER_TOKEN }}
          POSTMARK_FROM_EMAIL: ${{ secrets.POSTMARK_FROM_EMAIL }}
          POSTMARK_MESSAGE_STREAM: ${{ secrets.POSTMARK_MESSAGE_STREAM }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: ${{ github.ref_name }}
          ALPHA_AGENTS_EXECUTOR_ID: ${{ secrets.ALPHA_AGENTS_EXECUTOR_ID }}
          ALPHA_AGENTS_EXECUTOR_KEY_ID: ${{ secrets.ALPHA_AGENTS_EXECUTOR_KEY_ID }}
          ALPHA_AGENTS_EXECUTOR_ATTESTATION_SECRET: ${{ secrets.ALPHA_AGENTS_EXECUTOR_ATTESTATION_SECRET }}
          ALPHA_AGENTS_BENCHMARK_VERIFIER_ID: ${{ secrets.ALPHA_AGENTS_BENCHMARK_VERIFIER_ID }}
        run: |
          ssh -p "${SSH_PORT}" -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" "cat > ${APP_DIR}/.env <<'EOF'
          ALPHA_AGENTS_STORAGE=postgres
          ALPHA_AGENTS_ENABLE_SAMPLE_OVERLAY=false
          DATABASE_URL=${DATABASE_URL}
          ALPHA_AGENTS_AUTH_SECRET=${ALPHA_AGENTS_AUTH_SECRET}
          ALPHA_AGENTS_APP_URL=${ALPHA_AGENTS_APP_URL}
          NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
          GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
          GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
          POSTMARK_SERVER_TOKEN=${POSTMARK_SERVER_TOKEN}
          POSTMARK_FROM_EMAIL=${POSTMARK_FROM_EMAIL}
          POSTMARK_MESSAGE_STREAM=${POSTMARK_MESSAGE_STREAM}
          SENTRY_DSN=${SENTRY_DSN}
          SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT}
          SENTRY_RELEASE=${SENTRY_RELEASE}
          ALPHA_AGENTS_EXECUTOR_ID=${ALPHA_AGENTS_EXECUTOR_ID}
          ALPHA_AGENTS_EXECUTOR_KEY_ID=${ALPHA_AGENTS_EXECUTOR_KEY_ID}
          ALPHA_AGENTS_EXECUTOR_ATTESTATION_SECRET=${ALPHA_AGENTS_EXECUTOR_ATTESTATION_SECRET}
          ALPHA_AGENTS_BENCHMARK_VERIFIER_ID=${ALPHA_AGENTS_BENCHMARK_VERIFIER_ID}
          EOF"
          ssh -p "${SSH_PORT}" -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" "chmod +x ${APP_DIR}/scripts/deploy-vm.sh && APP_DIR=${APP_DIR} ALPHA_AGENTS_IMAGE=${IMAGE_REF} GHCR_USERNAME=${GHCR_USERNAME} GHCR_TOKEN=${GHCR_TOKEN} APP_DOMAIN=${APP_DOMAIN} ${APP_DIR}/scripts/deploy-vm.sh"
