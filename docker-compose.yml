services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: alpha_agents
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alpha_agents"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "db:migrate"]

  web:
    build:
      context: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["pnpm", "start"]
    ports:
      - "3100:3100"

  benchmark-worker:
    build:
      context: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["pnpm", "worker:benchmarks"]
